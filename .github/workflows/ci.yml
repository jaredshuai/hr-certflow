name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  backend:
    name: Backend lint and tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install backend
        run: python -m pip install -e "backend[dev]"

      - name: Ruff
        run: python -m ruff check backend/app backend/tests backend/migrations scripts

      - name: Pytest
        env:
          AUTO_CREATE_TABLES: "false"
        run: python -m pytest backend/tests -q

  frontend:
    name: Frontend build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        run: npm run build

  docker-build:
    name: Docker build smoke
    runs-on: ubuntu-latest
    needs:
      - backend
      - frontend
    steps:
      - uses: actions/checkout@v4

      - name: Build API image
        run: docker build -t hr-certflow-api:ci ./backend

      - name: Build web image
        run: docker build --target production -t hr-certflow-web:ci ./frontend
