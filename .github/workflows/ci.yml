name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  backend:
    name: Backend lint and tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-dependency-glob: backend/uv.lock

      - name: Install backend
        run: uv sync --project backend --extra dev --locked --python 3.12

      - name: Ruff
        run: uv run --project backend --extra dev ruff check backend/app backend/tests backend/migrations scripts

      - name: Ty
        run: uv run --project backend --extra dev ty check backend/app

      - name: Pytest
        env:
          AUTO_CREATE_TABLES: "false"
        run: uv run --project backend --extra dev pytest backend/tests -q

  frontend:
    name: Frontend build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend
        working-directory: frontend
        run: npm ci

      - name: Lint frontend
        working-directory: frontend
        run: npm run lint

      - name: Build frontend
        working-directory: frontend
        run: npm run build

  deploy-artifacts:
    name: Helm and GitOps validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: azure/setup-helm@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install validation dependencies
        run: python -m pip install pyyaml

      - name: Validate GitOps values
        run: python scripts/validate_deploy_artifacts.py

      - name: Helm lint dev
        run: helm lint deploy/helm/hr-certflow -f deploy/gitops/dev/values.yaml

      - name: Helm lint release
        run: helm lint deploy/helm/hr-certflow -f deploy/gitops/release/values.yaml

      - name: Helm template dev
        run: helm template hr-certflow deploy/helm/hr-certflow --namespace hr-certflow-dev -f deploy/gitops/dev/values.yaml > /tmp/hr-certflow-dev.yaml

      - name: Helm template release
        run: helm template hr-certflow deploy/helm/hr-certflow --namespace hr-certflow-release -f deploy/gitops/release/values.yaml > /tmp/hr-certflow-release.yaml

  docker-build:
    name: Docker build smoke
    runs-on: ubuntu-latest
    needs:
      - backend
      - frontend
      - deploy-artifacts
    steps:
      - uses: actions/checkout@v4

      - name: Build API image
        run: docker build -t hr-certflow-api:ci ./backend

      - name: Build web image
        run: docker build --target production -t hr-certflow-web:ci ./frontend
