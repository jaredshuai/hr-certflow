apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "hr-certflow.fullname" . }}-worker
  labels:
    {{- include "hr-certflow.labels" . | nindent 4 }}
    app.kubernetes.io/component: worker
spec:
  replicas: {{ .Values.worker.replicas }}
  selector:
    matchLabels:
      {{- include "hr-certflow.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: worker
  template:
    metadata:
      labels:
        {{- include "hr-certflow.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: worker
    spec:
      serviceAccountName: hr-certflow-runtime
      imagePullSecrets:
        {{- toYaml .Values.imagePullSecrets | nindent 8 }}
      containers:
        - name: worker
          image: "{{ .Values.images.api.repository }}:{{ .Values.images.api.tag }}"
          imagePullPolicy: {{ .Values.images.api.pullPolicy }}
          command:
            - celery
            - -A
            - app.celery_app.celery_app
            - worker
            - --loglevel=info
            - --concurrency={{ .Values.worker.concurrency }}
          envFrom:
            - configMapRef:
                name: {{ include "hr-certflow.fullname" . }}-config
            - secretRef:
                name: {{ .Values.runtimeSecretName }}
          resources:
            {{- toYaml .Values.worker.resources | nindent 12 }}
