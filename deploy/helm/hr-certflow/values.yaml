nameOverride: ""
fullnameOverride: ""

imagePullSecrets:
  - name: ghcr-pull-secret

runtimeSecretName: hr-certflow-runtime-secrets

config:
  APP_NAME: HR CertFlow
  APP_ENV: dev
  APP_TIMEZONE: Asia/Shanghai
  AUTO_CREATE_TABLES: "false"
  API_CORS_ORIGINS: http://10.34.200.180
  CELERY_NAMESPACE: hr-certflow-dev
  CELERY_QUEUE: hr-certflow-dev
  CELERY_ROUTING_KEY: hr-certflow-dev
  CELERY_REDIS_HASH_TAG: hr-certflow-dev
  CELERY_REDIS_PREFIX: "hr-certflow-dev:"
  S3_ENDPOINT_URL: ""
  S3_PUBLIC_ENDPOINT_URL: ""
  S3_REGION: us-east-1
  S3_BUCKET: hr-certflow-dev
  S3_FORCE_PATH_STYLE: "true"
  DIFY_BASE_URL: ""
  DIFY_WORKFLOW_ID: certificate-extraction
  NOTIFICATION_HR_RECIPIENTS: ""
  SMTP_STARTTLS: "true"

images:
  api:
    repository: ghcr.io/jaredshuai/hr-certflow-api
    tag: latest
    pullPolicy: IfNotPresent
  web:
    repository: ghcr.io/jaredshuai/hr-certflow-web
    tag: latest
    pullPolicy: IfNotPresent

api:
  replicas: 1
  port: 8000
  strategy:
    maxSurge: 0
    maxUnavailable: 1
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi

web:
  replicas: 1
  port: 80
  strategy:
    maxSurge: 0
    maxUnavailable: 1
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 250m
      memory: 256Mi

worker:
  replicas: 1
  concurrency: 2
  strategy:
    maxSurge: 0
    maxUnavailable: 1
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi

beat:
  replicas: 1
  strategy:
    maxSurge: 0
    maxUnavailable: 1
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      cpu: 250m
      memory: 256Mi

migrations:
  enabled: true
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      cpu: 250m
      memory: 256Mi

ingress:
  enabled: true
  className: traefik
  host: ""
  pathPrefix: /hr-certflow
  annotations: {}
