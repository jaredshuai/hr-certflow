# hr-certflow shared-k3s v1 onboarding request.
# This is an infra input document, not an application manifest to apply directly.
project:
  id: hr-certflow
  repo: https://github.com/jaredshuai/hr-certflow.git
  namespaces:
    dev: hr-certflow-dev
    release: hr-certflow-release
  urls:
    dev: http://10.34.200.180/hr-certflow-dev/
    release: http://10.34.200.180/hr-certflow/

runtime:
  backend:
    framework: FastAPI
    port: 8000
    healthPath: /api/v1/health
  frontend:
    framework: Umi Max / Ant Design Pro
    port: 80
  worker: Celery worker
  scheduler: Celery Beat

dependencies:
  data:
    - PostgreSQL dev/release database and user
    - Per-environment standalone Redis broker/result backend credentials injected through runtime secrets, with Celery queue/prefix isolation
    - Alibaba Cloud OSS bucket/prefix through the S3-compatible API
  external:
    - Shared Dify workflow-center endpoint and API key
    - WeCom/Feishu/DingTalk webhook or SMTP

infraToProvision:
  secrets:
    - hr-certflow-runtime-secrets
    - ghcr-pull-secret
  appProject:
    allowedRepo: https://github.com/jaredshuai/hr-certflow.git
    allowedNamespaces:
      - hr-certflow-dev
      - hr-certflow-release
  kubeconfigs:
    - namespace-scoped observer kubeconfig
    - namespace-scoped deployer/bootstrap kubeconfig if platform approves bootstrap flow
  releaseAutomation:
    desiredState: automated release rollout after GitOps values promotion
    requirement: enable automated sync on the hr-certflow-release Argo CD Application, or grant the workflow a narrow audited sync capability for only that Application
    guardrails:
      - release workflow must not receive plaintext runtime secrets
      - release smoke must pass on web, API health, and Celery/Redis before the promotion is accepted
      - rollback must use the existing-image promotion workflow with operation=rollback

runtimeSecretKeys:
  - DATABASE_URL
  - REDIS_URL
  - CELERY_BROKER_URL
  - CELERY_RESULT_BACKEND
  - S3_ACCESS_KEY_ID
  - S3_SECRET_ACCESS_KEY
  - DIFY_API_KEY
  - WECOM_WEBHOOK_URL
  - FEISHU_WEBHOOK_URL
  - DINGTALK_WEBHOOK_URL
  - SMTP_USERNAME
  - SMTP_PASSWORD

configMapKeys:
  - APP_NAME
  - APP_ENV
  - APP_TIMEZONE
  - AUTO_CREATE_TABLES
  - API_CORS_ORIGINS
  - CELERY_NAMESPACE
  - CELERY_QUEUE
  - CELERY_ROUTING_KEY
  - CELERY_REDIS_HASH_TAG
  - CELERY_REDIS_PREFIX
  - S3_ENDPOINT_URL
  - S3_REGION
  - S3_BUCKET
  - S3_FORCE_PATH_STYLE
  - AWS_REQUEST_CHECKSUM_CALCULATION
  - AWS_RESPONSE_CHECKSUM_VALIDATION
  - UPLOAD_PREFIX
  - DIFY_BASE_URL
  - DIFY_WORKFLOW_ID
  - NOTIFICATION_HR_RECIPIENTS
  - SMTP_HOST
  - SMTP_PORT
  - SMTP_STARTTLS
  - MAIL_FROM

smoke:
  dev:
    web: http://10.34.200.180/hr-certflow-dev/
    api: http://10.34.200.180/hr-certflow-dev/api/v1/health
    celeryRedis:
      envFrom:
        - secret: hr-certflow-runtime-secrets
        - configMap: hr-certflow-config
      commands:
        - python -m app.smoke.celery_redis_isolation selftest
        - python -m app.smoke.celery_redis_isolation send
        - python -m app.smoke.celery_redis_isolation assert-keys
  release:
    web: http://10.34.200.180/hr-certflow/
    api: http://10.34.200.180/hr-certflow/api/v1/health
    celeryRedis:
      envFrom:
        - secret: hr-certflow-runtime-secrets
        - configMap: hr-certflow-config
      commands:
        - python -m app.smoke.celery_redis_isolation selftest
        - python -m app.smoke.celery_redis_isolation send
        - python -m app.smoke.celery_redis_isolation assert-keys
